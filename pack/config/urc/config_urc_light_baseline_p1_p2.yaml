model:
  name: light_fccnet
  in_channels: 3
  input_size:
  - 384
  - 384
  stage_channels:
  - 32
  - 64
  - 96
  - 128
  fusion_channels: 96
  spatial_max_tokens: 1024
  head_init_bias: -5.5
  use_p1: true
  use_p2: true
data:
  sigma: 6
  gwhd_train_csv: ''
  gwhd_val_csv: ''
  gwhd_images_dir: ''
  urc_root: /root/autodl-tmp/datasets/URC
  urc_train_split_file: /root/autodl-tmp/datasets/URC/train.txt
  urc_val_split_file: /root/autodl-tmp/datasets/URC/val.txt
  mtc_root: ''
  use_coarse_dropout: false
  use_random_resized_crop: false
  horizontal_flip_p: 0.5
  use_color_jitter: true
  color_jitter_p: 0.3
  color_jitter_brightness: 0.1
  color_jitter_contrast: 0.1
  color_jitter_saturation: 0.1
  color_jitter_hue: 0.05
training:
  batch_size: 12
  num_epochs: 100
  learning_rate: 5.0e-05
  loss_type: light_fcc
  use_p3_loss: false
  alpha: 0.1
  ldms_k: 3
  ldms_factor: 1.0
  ldms_max_ratio: 0.05
  match_box_width: 4.0
  match_box_height: 8.0
  ssim_window: 11
  ssim_c: 0.0001
  num_workers: 4
  optimizer:
    type: Adam
    weight_decay: 0.0001
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
  scheduler:
    type: StepLR
    step_size: 30
    gamma: 0.5
eval:
  val_freq: 1
  save_freq: 200
  metrics:
  - MAE
  - MSE
  - MAPE
paths:
  checkpoint_dir: /root/checkpoints/urc_light_baseline_p1_p2
  log_dir: /root/tf-logs/urc_light_baseline_p1_p2
seed: 42
use_amp: false
pin_memory: true
